<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Puritan:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <title>Product Cart</title>
  </head>
  <body>
    <main>
      <h1>Product Cart</h1>
      <article>
        <!-- Image de la montre -->
        <figure class="img-container">
          <img
            src="https://res.cloudinary.com/dbm4cyzrb/image/upload/v1782392708/28442-removebg-preview_kyhiyu.png"
            alt="montre en argent"
          />
          <span class="promo">-20%</span>
        </figure>
        <!-- Marque de la montre -->
        <h2>Classic London</h2>
        <!-- Prix de la montre -->
        <p class="price">
          <span class="price-old">$450.00</span><span class="price-new">$360.00</span>
        </p>
        <!-- Different actions -->
        <section class="btn-container">
          <button class="btn">Buy Now</button>
          <button class="btn">Add to Cart</button>
        </section>
      </article>
    </main>
  </body>
</html>
